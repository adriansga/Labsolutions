<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OG Image Generator</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Arial', sans-serif;
            background: #050507;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .og-image {
            width: 1200px;
            height: 630px;
            background: radial-gradient(ellipse at top, rgba(14, 165, 233, 0.15), transparent 60%),
                        #050507;
            padding: 80px;
            position: relative;
            overflow: hidden;
        }
        .grid {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(14, 165, 233, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(14, 165, 233, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
        }
        .content {
            position: relative;
            z-index: 1;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .logo {
            font-size: 48px;
            font-weight: 900;
            color: #0EA5E9;
            letter-spacing: 0.1em;
        }
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        h1 {
            font-size: 72px;
            font-weight: 900;
            color: #fff;
            line-height: 1.1;
            margin-bottom: 24px;
            max-width: 900px;
        }
        h1 span {
            background: linear-gradient(135deg, #0EA5E9, #F59E0B);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        p {
            font-size: 32px;
            color: #888899;
            max-width: 800px;
            line-height: 1.5;
        }
        .badges {
            display: flex;
            gap: 24px;
            margin-top: 32px;
        }
        .badge {
            background: rgba(14, 165, 233, 0.2);
            color: #0EA5E9;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 20px;
        }
        .side-panel {
            position: absolute;
            right: 80px;
            top: 50%;
            transform: translateY(-50%);
            text-align: right;
        }
        .price {
            font-size: 96px;
            font-weight: 900;
            color: #F59E0B;
        }
        .price span {
            font-size: 32px;
            color: #888899;
        }
    </style>
</head>
<body>
    <div class="og-image">
        <div class="grid"></div>
        <div class="content">
            <div class="logo">AI BIZNES LAB</div>
            <div class="main">
                <h1>Cyfrowy Obieg Dokumentów w <span>7 Dni</span></h1>
                <p>Koniec z ręcznym rejestrowaniem. QR kody, e-podpisy, automatyczne wyniki. Oszczędź 15h tygodniowo.</p>
                <div class="badges">
                    <div class="badge">⭐ 4.9/5 (47 laboratoriów)</div>
                    <div class="badge">🛡️ 30 dni gwarancji</div>
                    <div class="badge">🚀 Wdrożenie w 7-14 dni</div>
                </div>
            </div>
        </div>
        <div class="side-panel">
            <div class="price">4997<span> PLN</span></div>
        </div>
    </div>
</body>
</html>
