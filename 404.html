<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Strona Nie Istnieje | AI Biznes Lab</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <style>
        :root {
            --primary: #0EA5E9;
            --accent: #F59E0B;
            --bg-dark: #050507;
            --text-main: #e0e0e0;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow: hidden;
        }
        .container {
            text-align: center;
            max-width: 600px;
        }
        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(4rem, 15vw, 10rem);
            font-weight: 900;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: glitch 2s infinite;
            position: relative;
        }
        @keyframes glitch {
            0%, 100% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(2px, -2px); }
            60% { transform: translate(-2px, -2px); }
            80% { transform: translate(2px, 2px); }
        }
        h2 {
            font-size: 1.5rem;
            margin: 24px 0 16px;
            color: #fff;
        }
        p {
            color: #888899;
            margin-bottom: 32px;
            line-height: 1.6;
        }
        .cta-primary {
            background: var(--primary);
            color: white;
            padding: 16px 32px;
            border-radius: 50px;
            font-weight: 600;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s;
            box-shadow: 0 0 20px rgba(14, 165, 233, 0.4);
        }
        .cta-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(14, 165, 233, 0.6);
            background: #0284C7;
        }
        .grid-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(14, 165, 233, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(14, 165, 233, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: -1;
        }
    </style>
</head>
<body>
    <div class="grid-bg"></div>
    <div class="container">
        <h1>404</h1>
        <h2>Strona Nie Istnieje</h2>
        <p>Wygląda na to że ta strona została przeniesiona lub nie istnieje.<br>Wróć na stronę główną lub skontaktuj się z nami.</p>
        <a href="index.html" class="cta-primary">← WRÓĆ NA STRONĘ GŁÓWNĄ</a>
    </div>
</body>
</html>
